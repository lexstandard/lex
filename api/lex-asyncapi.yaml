          required: [consentGranted, processingPurpose, sensitiveDataIncluded, crossBorderTransferApproved]
          properties:
            consentGranted:
              type: boolean
            processingPurpose:
              type: string
            sensitiveDataIncluded:
              type: boolean
            crossBorderTransferApproved:
              type: boolean
            consentTimestamp:
              type: string
              format: date-time
        lgpd:
          type: object
          description: Brazil LGPD (Lei Geral de Proteção de Dados) consent
          properties:
            legalBasis:
              type: string
              enum: [CONSENT, LEGITIMATE_INTEREST, CONTRACT, LEGAL_OBLIGATION, VITAL_INTEREST, RESEARCH, CREDIT_PROTECTION, JUDICIAL, HEALTH, REGULATORY]
            consentGranted:
              type: boolean
            purposeDescription:
              type: string
            dataControllerCnpj:
              type: string
            retentionPeriodDays:
              type: integer
              minimum: 1
            consentTimestamp:
              type: string
              format: date-time
        popia:
          type: object
          description: South Africa POPIA (Protection of Personal Information Act, Jul 2021) consent
          properties:
            consentGranted:
              type: boolean
            purposeDescription:
              type: string
            responsiblePartyName:
              type: string
            consentTimestamp:
              type: string
              format: date-time
            dataSubjectRightsNotified:
              type: boolean
        pipeda:
          type: object
          description: Canada PIPEDA / Quebec Law 25 consent
          properties:
            consentGranted:
              type: boolean
            purposeDescription:
              type: string
            impliedConsent:
              type: boolean
            quebecLaw25Applicable:
              type: boolean
            consentTimestamp:
              type: string
              format: date-time
        pdpaSg:
          type: object
          description: Singapore PDPA (Personal Data Protection Act 2012, amended 2020) consent
          properties:
            consentGranted:
              type: boolean
