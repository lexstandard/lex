              type: boolean
        consentCollectionMethod:
          type: string
          enum: [WEB_FORM, MOBILE_APP, PAPER_FORM, VERBAL_RECORDED, PRE_EXISTING_RELATIONSHIP, IMPORTED]
        consentFormVersion:
          type: string
        collectedAt:
          type: string
          format: date-time

    DeduplicationBlock:
      type: object
      description: Cross-platform lead deduplication signals
      properties:
        customerFingerprint:
          type: string
          pattern: '^[a-f0-9]{64}$'
          description: SHA-256 hash of normalized email+phone+lastName — never raw PII
        fingerprintVersion:
          type: string
          enum: [SHA256_V1]
          default: SHA256_V1
        deduplicationWindowHours:
          type: integer
          minimum: 1
          maximum: 720
          default: 72
        senderLeadId:
          type: string
        duplicateOfLeadId:
          type: string
          description: Set by receiver when duplicate is detected
        crossPlatformIds:
          type: array
          items:
            type: object
            required: [platform, leadId]
            properties:
              platform:
                type: string
              leadId:
                type: string
              leadTimestamp:
                type: string
                format: date-time
        deduplicationStatus:
          type: string
          enum: [PENDING, UNIQUE, DUPLICATE, MERGED]

    LeadIntelligence:
      type: object
      description: ML-generated lead scoring signals — advisory only, produced by platforms/engines
      properties:
        intentScore:
          type: number
          minimum: 0.0
          maximum: 1.0
          description: Purchase intent probability (0 = no intent, 1 = near-certain buyer)
        buyingWindowDays:
          type: integer
          minimum: 1
          description: Predicted days until purchase decision
        confidenceLevel:
          type: string
          enum: [LOW, MEDIUM, HIGH, VERY_HIGH]
        behavioralSignals:
          type: array
          items:
            type: string
          description: Standardized observed customer action codes
        predictedProduct:
          type: object
          properties:
            make:
              type: string
            model:
              type: string
            trim:
              type: string
            confidence:
              type: number
              minimum: 0.0
              maximum: 1.0
        churnRisk:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        leadQualityTier:
          type: string
          enum: [PLATINUM, GOLD, SILVER, BRONZE, COLD]
        priceRangeFit:
          type: string
          enum: [BELOW_RANGE, LOWER_RANGE, EXACT, UPPER_RANGE, ABOVE_RANGE]
        financingLikelihood:
          type: number
          minimum: 0.0
          maximum: 1.0
        tradeInLikelihood:
          type: number
          minimum: 0.0
          maximum: 1.0
        evInterestScore:
          type: number
          minimum: 0.0
          maximum: 1.0
        recommendedResponseSla:
          type: string
          description: ISO 8601 Duration (e.g., PT2H, PT30M)
          example: PT2H
        optimalContactTime:
          type: object
          properties:
            dayOfWeek:
              type: array
              items:
                type: string
                enum: [MON, TUE, WED, THU, FRI, SAT, SUN]
            timeRange:
              type: string
              example: "10:00-14:00"

    InstalledOption:
      type: object
      description: A single dealer-installed or factory option on the desired product
      required: [name]
      properties:
        name:
          type: string
        source:
          type: string
          enum: [FACTORY, DEALER_INSTALLED, AFTERMARKET, OEM_ACCESSORY, UNKNOWN]
        partNumber:
          type: string
        estimatedValue:
          type: number
          minimum: 0

    FleetBuyer:
      type: object
      description: Fleet purchase context when buyer is a fleet manager or corporate buyer
      properties:
        isFleet:
          type: boolean
        fleetSize:
          type: integer
          minimum: 1
        unitsToOrder:
          type: integer
          minimum: 1
        fleetManagerName:
          type: string
        fleetManagerEmail:
          type: string
          format: email

    LexTradeIn:
      type: object
      description: Trade-in asset details submitted alongside a lead
      properties:
        year:
          type: integer
          minimum: 1900
        make:
          type: string
        model:
          type: string
        trim:
          type: string
        mileage:
          type: integer
          minimum: 0
        condition:
          type: string
          enum: [EXCELLENT, GOOD, FAIR, POOR, UNKNOWN]
        vin:
          type: string
          pattern: '^[A-HJ-NPR-Z0-9]{17}$'
        estimatedTradeInValue:
          type: number
          minimum: 0
        odometerStatus:
          type: string
          enum: [ACTUAL, NOT_ACTUAL, EXEMPT, UNKNOWN]
        titleStatus:
          type: string
          enum: [CLEAN, SALVAGE, REBUILT, LEMON_LAW_BUYBACK, FLOOD, HAIL, PARTS_ONLY, UNKNOWN]
        payoffAmount:
          type: number
          minimum: 0
        payoffCurrency:
          type: string
          pattern: '^[A-Z]{3}$'
        previousOwnerCount:
          type: integer
          minimum: 0
        accidentHistory:
          $ref: '#/components/schemas/TradeInAccidentHistory'
        vehicleHistoryReport:
          $ref: '#/components/schemas/TradeInVehicleHistoryReport'

    TradeInAccidentHistory:
      type: object
      description: Accident history for a trade-in vehicle
      properties:
        reportedAccidentCount:
          type: integer
          minimum: 0
        airbagDeployment:
          type: boolean
        frameOrStructuralDamage:
          type: boolean

    TradeInVehicleHistoryReport:
      type: object
      description: Reference to a vehicle history report for the trade-in
      properties:
        reportType:
          type: string
          enum: [CARFAX, AUTOCHECK, NMVTIS, OTHER]
        reportReferenceId:
          type: string
        pullDate:
          type: string
          format: date

    AviationLeadContext:
      type: object
      description: Aviation-specific context fields for aircraft leads
      properties:
        operatorCertificate:
          type: string
          enum: [PART_91, PART_121, PART_135, PART_137, EASA_AOC, PRIVATE, MILITARY, UNKNOWN]
        intendedUse:
          type: string
          enum: [PRIVATE, CHARTER, CARGO, MEDICAL_EVACUATION, TRAINING, PATROL, SURVEY, OTHER]
        currentRegistryCountry:
          type: string
          description: ISO 3166-1 alpha-2 country code of current aircraft registry
          pattern: '^[A-Z]{2}$'
        targetRegistryCountry:
          type: string
          description: ISO 3166-1 alpha-2 country code of target registry after sale
          pattern: '^[A-Z]{2}$'

    MaritimeLeadContext:
      type: object
      description: Maritime-specific context fields for vessel leads
      properties:
        charterType:
          type: string
          enum: [BARE_BOAT, TIME_CHARTER, VOYAGE_CHARTER, DEMISE, NONE]
        intendedTradingArea:
          type: string
          description: Named trading area or geographic region (e.g., North Atlantic, Coastal US)
        intendedCargoType:
          type: string
          description: Primary cargo type the vessel will carry

    HeavyEquipmentLeadContext:
      type: object
      description: Heavy equipment-specific context fields
      properties:
        attachmentCouplerStandard:
          type: string
          enum: [ISO_19296, SAE_J2513, OEM_PROPRIETARY, NONE, UNKNOWN]
        jobSiteAltitude:
          type: integer
          description: Job site altitude in metres above sea level — affects engine derating
        exportLicenseRequired:
          type: boolean
          description: Whether an export licence is required for the destination country
        exportDestinationCountry:
          type: string
          description: ISO 3166-1 alpha-2 destination country code for export
          pattern: '^[A-Z]{2}$'

    RealEstateContingency:
      type: object
      description: A single real estate transaction contingency
      properties:
        type:
          type: string
          enum: [FINANCING, INSPECTION, APPRAISAL, TITLE, HOME_SALE, KICK_OUT, OTHER]
        status:
          type: string
          enum: [PENDING, SATISFIED, WAIVED, TRIGGERED]
        deadline:
          type: string
          format: date
        notes:
          type: string

    RealEstateLeadContext:
      type: object
      description: Real estate-specific context fields for property transaction leads
      properties:
        buyerRepresentationAgreementStatus:
          type: string
          enum: [SIGNED, UNSIGNED, NOT_REQUIRED, EXPIRED]
        exchangeType:
          type: string
          enum: ['NONE', '1031_EXCHANGE', '1033_EXCHANGE', 'REVERSE_EXCHANGE', 'IMPROVEMENT_EXCHANGE']
        preApprovalAmount:
          type: number
          minimum: 0
        preApprovalCurrency:
          type: string
          pattern: '^[A-Z]{3}$'
        preApprovalExpiryDate:
          type: string
          format: date
        preApprovalLender:
          type: string
        preApprovalLoanType:
          type: string
          enum: [CONVENTIONAL, FHA, VA, USDA, JUMBO, BRIDGE, HARD_MONEY, OTHER]
        contingencies:
          type: array
          items:
            $ref: '#/components/schemas/RealEstateContingency'
        sellerConcessionsRequested:
          type: boolean
        sellerConcessionAmount:
          type: number
          minimum: 0
        sellerConcessionCurrency:
          type: string
          pattern: '^[A-Z]{3}$'
        homeWarrantyRequested:
          type: boolean
        homeWarrantyCoveredBy:
          type: string
          enum: [BUYER, SELLER, SPLIT, NONE]
        propertyDisclosureStatus:
          type: string
          enum: [RECEIVED, NOT_YET_RECEIVED, WAIVED, NOT_APPLICABLE]
        occupancyStatus:
          type: string
          enum: [OWNER_OCCUPIED, TENANT_OCCUPIED, VACANT, UNKNOWN]
        saleType:
          type: string
          enum: [STANDARD, SHORT_SALE, FORECLOSURE, PROBATE, COURT_ORDERED, NEW_CONSTRUCTION, FSBO]
        firstTimeBuyer:
          type: boolean
        investmentPurpose:
          type: boolean
        targetClosingDate:
          type: string
          format: date
        moveInDate:
          type: string
          format: date
        leaseback:
          type: boolean
        leasebackPeriodDays:
          type: integer
          minimum: 0
        buyerAgentLicenseNumber:
          type: string
        buyerAgentStateLicense:
          type: string
        listingAgentLicenseNumber:
          type: string
        listingAgentStateLicense:
          type: string

    TechnologyLeadContext:
      type: object
      description: Technology device and solution-specific context fields
      properties:
        securityCertificationRequirements:
          type: array
          description: List of required security certifications for the technology asset
          items:
            type: string
            enum: [FIPS_140_2, FIPS_140_3, CC_EAL4_PLUS, ISO_27001, SOC2_TYPE2, FEDRAMP_MODERATE, FEDRAMP_HIGH, HIPAA, PCI_DSS, NONE]
        evergreenRefreshTrigger:
          type: string
          description: What event drives an evergreen device refresh cycle
          enum: [CALENDAR, EOL_DRIVEN, PERFORMANCE_DEGRADATION, SECURITY_PATCH_ONLY]
        evergreenRefreshThresholdMonths:
          type: integer
          description: Refresh cycle period in months
          minimum: 1
        sustainabilityRequirements:
          type: array
          description: Required environmental/sustainability certifications
          items:
            type: string
            enum: [ENERGY_STAR, EPEAT_GOLD, EPEAT_SILVER, EPEAT_BRONZE, TCO_CERTIFIED, REACH, ROHS, NONE]
        conflictMineralsComplianceRequired:
          type: boolean
          description: Whether Dodd-Frank Section 1502 / OECD conflict minerals compliance is required
            timezone:
              type: string
              description: IANA timezone identifier
        modelMetadata:
          type: object
          required: [source, modelId, scoredAt]
          properties:
            source:
              type: string
              enum: [PLATFORM_ML_ENGINE, DMS_SCORING, OEM_CRM, THIRD_PARTY_ENRICHMENT]
            modelId:
              type: string
            modelVersion:
              type: string
            scoredAt:
              type: string
              format: date-time
            dataFreshnessDays:
              type: integer
              minimum: 0

  securitySchemes:
    oauth2:
      type: oauth2
      description: |
        OAuth 2.0 Client Credentials flow for machine-to-machine authentication.
        LEX defines this as the required auth pattern — your platform supplies
        the token endpoint. Replace the tokenUrl below with your auth server.
      flows:
        clientCredentials:
          tokenUrl: https://{your-auth-server}/oauth/token
          scopes:
            lex:leads:read: Read LEAD messages
            lex:leads:write: Send LEAD messages
            lex:assets:read: Read ASSET messages
            lex:assets:write: Send ASSET messages
            lex:closures:write: Send LEAD_CLOSURE messages
            lex:subscriptions:manage: Manage subscriptions
    apiKey:
      type: httpApiKey
      description: API key for sandbox access
      name: X-LEX-API-Key
      in: header
