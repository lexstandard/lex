            icoRegistrationNumber:
              type: string
            consentWithdrawnAt:
              type: string
              format: date-time
              nullable: true
        usStatePrivacy:
          type: object
          description: US State Privacy Laws (Virginia CDPA, Colorado CPA, Connecticut CTDPA, Texas TDPSA, Montana MCDPA, Oregon OCPA, and others)
          properties:
            statesOptedOut:
              type: array
