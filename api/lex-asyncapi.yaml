            purposeId:
              type: string
            consentTimestamp:
              type: string
              format: date-time
            nomineeDefined:
              type: boolean
        ukGdpr:
          type: object
          description: UK GDPR / Data Protection Act 2018 consent (applies to GB customers)
          properties:
            legalBasis:
              type: string
