              type: string
            thirdPartyProvisionConsent:
              type: boolean
            crossBorderTransferConsent:
              type: boolean
            consentTimestamp:
              type: string
              format: date-time
        nfadp:
          type: object
          description: Switzerland nFADP (revised Federal Act on Data Protection, Sep 2023) consent
          properties:
            legalBasis:
              type: string
              enum: [CONSENT, LEGITIMATE_INTEREST, CONTRACT, LEGAL_OBLIGATION]
            purposeDescription:
              type: string
            dataControllerName:
              type: string
            retentionPeriodDays:
              type: integer
              minimum: 1
            consentTimestamp:
              type: string
              format: date-time
        pipaKr:
          type: object
          description: South Korea PIPA-K (Personal Information Protection Act, 2023 amendment) consent
          properties:
            consentGranted:
              type: boolean
            purposeDescription:
              type: string
            sensitiveDataIncluded:
              type: boolean
            thirdPartyProvisionConsent:
              type: boolean
            consentTimestamp:
              type: string
              format: date-time
        pdplSa:
          type: object
          description: Saudi Arabia PDPL (Personal Data Protection Law, effective Mar 2024) consent
          properties:
            consentGranted:
              type: boolean
            processingPurpose:
              type: string
            sensitiveDataIncluded:
              type: boolean
            crossBorderTransferApproved:
              type: boolean
            consentTimestamp:
              type: string
              format: date-time
        pdpaTh:
          type: object
          description: Thailand PDPA (Personal Data Protection Act, Jun 2022) consent
          properties:
            legalBasis:
              type: string
              enum: [CONSENT, CONTRACT, LEGAL_OBLIGATION, VITAL_INTEREST, PUBLIC_TASK, LEGITIMATE_INTEREST]
            consentGranted:
              type: boolean
            purposeDescription:
              type: string
            dataControllerName:
              type: string
            retentionPeriodDays:
              type: integer
              minimum: 1
            consentTimestamp:
              type: string
              format: date-time
        marketingConsent:
          type: object
          properties:
            email:
              type: boolean
            sms:
              type: boolean
            pushNotification:
              type: boolean
            whatsapp:
              type: boolean
            postalMail:
              type: boolean
            thirdPartySharing:
              type: boolean
